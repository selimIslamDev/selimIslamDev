<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#0d1b3e"/>
      <stop offset="70%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#8b5cf6"/>
      <stop offset="60%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#a5b4fc"/>
      <stop offset="80%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="25"/></filter>

    <!-- Clip paths for typewriter effect on each line -->
    <clipPath id="clip1">
      <rect x="72" y="88" width="0" height="22">
        <animate attributeName="width" values="0;260;260;260;0;0" dur="12s" repeatCount="indefinite" keyTimes="0;0.12;0.28;0.38;0.42;1" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="72" y="88" width="0" height="22">
        <animate attributeName="width" values="0;0;0;200;200;200;0;0" dur="12s" repeatCount="indefinite" keyTimes="0;0.38;0.45;0.57;0.62;0.7;0.74;1" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="72" y="88" width="0" height="22">
        <animate attributeName="width" values="0;0;0;0;240;240;0" dur="12s" repeatCount="indefinite" keyTimes="0;0.7;0.74;0.8;0.9;0.95;1" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Orb glows -->
  <ellipse cx="780" cy="40" rx="160" ry="130" fill="#6366f1" opacity="0.18" filter="url(#blur1)"/>
  <ellipse cx="200" cy="160" rx="140" ry="110" fill="#06b6d4" opacity="0.14" filter="url(#blur2)"/>
  <ellipse cx="100" cy="60" rx="100" ry="80" fill="#8b5cf6" opacity="0.12" filter="url(#blur2)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="3" height="200" fill="url(#topLine)"/>
  <rect x="0" y="0" width="900" height="2.5" fill="url(#topLine)"/>
  <rect x="0" y="197.5" width="900" height="2.5" fill="url(#topLine)" opacity="0.6"/>

  <!-- Name -->
  <text x="48" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="800" fill="url(#nameGrad)" letter-spacing="-0.5">MD Selim Islam</text>

  <!-- Prefix > -->
  <text x="48" y="106" font-family="'Courier New',monospace" font-size="14" fill="#6366f1">{'>'}</text>

  <!-- Line 1: Full-Stack Web Developer -->
  <text x="72" y="106" font-family="'Courier New',monospace" font-size="14" fill="#a5b4fc" clip-path="url(#clip1)">Full-Stack Web Developer</text>

  <!-- Line 2: MERN Stack Developer -->
  <text x="72" y="106" font-family="'Courier New',monospace" font-size="14" fill="#a5b4fc" clip-path="url(#clip2)">MERN Stack Developer</text>

  <!-- Line 3: Next.js | PostgreSQL | Prisma -->
  <text x="72" y="106" font-family="'Courier New',monospace" font-size="14" fill="#a5b4fc" clip-path="url(#clip3)">Next.js | PostgreSQL | Prisma</text>

  <!-- Blinking cursor -->
  <rect x="74" y="92" width="2" height="16" fill="#06b6d4">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="x" values="
      74;74;74;74;74;74;74;
      74;74;74;74;74;74;74" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- Sub text -->
  <text x="48" y="130" font-family="'Courier New',monospace" font-size="11" fill="#334155">Crafting scalable apps ·</text>
  <text x="191" y="130" font-family="'Courier New',monospace" font-size="11" fill="#38bdf8"> MERN</text>
  <text x="229" y="130" font-family="'Courier New',monospace" font-size="11" fill="#334155"> ·</text>
  <text x="241" y="130" font-family="'Courier New',monospace" font-size="11" fill="#38bdf8"> Next.js</text>
  <text x="290" y="130" font-family="'Courier New',monospace" font-size="11" fill="#334155"> ·</text>
  <text x="302" y="130" font-family="'Courier New',monospace" font-size="11" fill="#38bdf8"> PostgreSQL</text>
  <text x="369" y="130" font-family="'Courier New',monospace" font-size="11" fill="#334155"> · 📍 Bangladesh</text>

  <!-- FRONT row -->
  <text x="48" y="158" font-family="'Courier New',monospace" font-size="9" fill="#334155" letter-spacing="2">FRONT</text>
  <rect x="100" y="145" width="62" height="20" rx="3" fill="#0c2340" stroke="#0369a1" stroke-width="1"/>
  <text x="131" y="159" font-family="'Courier New',monospace" font-size="10" fill="#61dafb" text-anchor="middle">React.js</text>
  <rect x="168" y="145" width="56" height="20" rx="3" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="196" y="159" font-family="'Courier New',monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">Next.js</text>
  <rect x="230" y="145" width="74" height="20" rx="3" fill="#0f2847" stroke="#1d4ed8" stroke-width="1"/>
  <text x="267" y="159" font-family="'Courier New',monospace" font-size="10" fill="#60a5fa" text-anchor="middle">TypeScript</text>

  <!-- BACK row -->
  <text x="48" y="183" font-family="'Courier New',monospace" font-size="9" fill="#334155" letter-spacing="2">BACK</text>
  <rect x="100" y="170" width="58" height="20" rx="3" fill="#052e16" stroke="#065f46" stroke-width="1"/>
  <text x="129" y="184" font-family="'Courier New',monospace" font-size="10" fill="#86efac" text-anchor="middle">Node.js</text>
  <rect x="164" y="170" width="70" height="20" rx="3" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <text x="199" y="184" font-family="'Courier New',monospace" font-size="10" fill="#d1d5db" text-anchor="middle">Express.js</text>

  <!-- DB/ORM row -->
  <text x="440" y="158" font-family="'Courier New',monospace" font-size="9" fill="#334155" letter-spacing="2">DB/ORM</text>
  <rect x="500" y="145" width="64" height="20" rx="3" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="532" y="159" font-family="'Courier New',monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">MongoDB</text>
  <rect x="570" y="145" width="78" height="20" rx="3" fill="#0c1a3a" stroke="#1e40af" stroke-width="1"/>
  <text x="609" y="159" font-family="'Courier New',monospace" font-size="10" fill="#93c5fd" text-anchor="middle">PostgreSQL</text>
  <rect x="654" y="145" width="52" height="20" rx="3" fill="#1a0f2e" stroke="#5b21b6" stroke-width="1"/>
  <text x="680" y="159" font-family="'Courier New',monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">Prisma</text>

  <!-- Right info -->
  <text x="852" y="165" font-family="'Courier New',monospace" font-size="10" fill="#475569" text-anchor="end">✉ salimislam0036@gmail.com</text>
  <text x="852" y="183" font-family="'Courier New',monospace" font-size="10" fill="#475569" text-anchor="end">📍 Bangladesh</text>
</svg>
