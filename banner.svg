<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#0d1b3e"/>
      <stop offset="70%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#8b5cf6"/>
      <stop offset="60%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#a5b4fc"/>
      <stop offset="80%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="35"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="28"/></filter>

    <!-- Typewriter clip paths -->
    <clipPath id="clip1">
      <rect x="76" y="100" width="0" height="22">
        <animate attributeName="width" values="0;260;260;260;0;0" dur="12s" repeatCount="indefinite" keyTimes="0;0.12;0.28;0.38;0.42;1" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="76" y="100" width="0" height="22">
        <animate attributeName="width" values="0;0;0;200;200;200;0;0" dur="12s" repeatCount="indefinite" keyTimes="0;0.38;0.45;0.57;0.62;0.70;0.74;1" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="76" y="100" width="0" height="22">
        <animate attributeName="width" values="0;0;0;0;240;240;0" dur="12s" repeatCount="indefinite" keyTimes="0;0.70;0.74;0.80;0.90;0.95;1" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- Orb glows -->
  <ellipse cx="800" cy="50" rx="180" ry="150" fill="#6366f1" opacity="0.16" filter="url(#blur1)"/>
  <ellipse cx="150" cy="190" rx="150" ry="120" fill="#06b6d4" opacity="0.13" filter="url(#blur2)"/>
  <ellipse cx="80"  cy="60"  rx="110" ry="90"  fill="#8b5cf6" opacity="0.11" filter="url(#blur2)"/>

  <!-- Accent lines -->
  <rect x="0" y="0"   width="3"   height="240" fill="url(#topLine)"/>
  <rect x="0" y="0"   width="900" height="2.5" fill="url(#topLine)"/>
  <rect x="0" y="237.5" width="900" height="2.5" fill="url(#topLine)" opacity="0.6"/>

  <!-- ── NAME ── -->
  <text x="48" y="72"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="44" font-weight="800"
    fill="url(#nameGrad)" letter-spacing="-0.5">MD Selim Islam</text>

  <!-- ── TYPEWRITER ROLE ── -->
  <text x="48" y="108" font-family="'Courier New',monospace" font-size="14" fill="#6366f1">{'>'}</text>
  <text x="76" y="108" font-family="'Courier New',monospace" font-size="14" fill="#a5b4fc" clip-path="url(#clip1)">Full-Stack Web Developer</text>
  <text x="76" y="108" font-family="'Courier New',monospace" font-size="14" fill="#a5b4fc" clip-path="url(#clip2)">MERN Stack Developer</text>
  <text x="76" y="108" font-family="'Courier New',monospace" font-size="14" fill="#a5b4fc" clip-path="url(#clip3)">Next.js | PostgreSQL | Prisma</text>

  <!-- Blinking cursor -->
  <rect x="78" y="94" width="2" height="17" fill="#06b6d4">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ── SUB TEXT ── -->
  <text x="48" y="136" font-family="'Courier New',monospace" font-size="11" fill="#475569">Crafting scalable apps ·
  </text>
  <text x="196" y="136" font-family="'Courier New',monospace" font-size="11" fill="#38bdf8">MERN</text>
  <text x="234" y="136" font-family="'Courier New',monospace" font-size="11" fill="#475569"> · </text>
  <text x="248" y="136" font-family="'Courier New',monospace" font-size="11" fill="#38bdf8">Next.js</text>
  <text x="298" y="136" font-family="'Courier New',monospace" font-size="11" fill="#475569"> · </text>
  <text x="312" y="136" font-family="'Courier New',monospace" font-size="11" fill="#38bdf8">PostgreSQL</text>
  <text x="378" y="136" font-family="'Courier New',monospace" font-size="11" fill="#475569"> · 📍 Bangladesh</text>

  <!-- ── ROW 1: FRONT tags ── -->
  <text x="48" y="168" font-family="'Courier New',monospace" font-size="9" fill="#475569" letter-spacing="2">FRONT</text>

  <rect x="104" y="155" width="66" height="22" rx="4" fill="#0c2340" stroke="#0369a1" stroke-width="1"/>
  <text x="137" y="170" font-family="'Courier New',monospace" font-size="10" fill="#61dafb" text-anchor="middle">React.js</text>

  <rect x="176" y="155" width="60" height="22" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="206" y="170" font-family="'Courier New',monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">Next.js</text>

  <rect x="242" y="155" width="78" height="22" rx="4" fill="#0f2847" stroke="#1d4ed8" stroke-width="1"/>
  <text x="281" y="170" font-family="'Courier New',monospace" font-size="10" fill="#60a5fa" text-anchor="middle">TypeScript</text>

  <!-- ── ROW 2: BACK tags ── -->
  <text x="48" y="210" font-family="'Courier New',monospace" font-size="9" fill="#475569" letter-spacing="2">BACK</text>

  <rect x="104" y="197" width="62" height="22" rx="4" fill="#052e16" stroke="#065f46" stroke-width="1"/>
  <text x="135" y="212" font-family="'Courier New',monospace" font-size="10" fill="#86efac" text-anchor="middle">Node.js</text>

  <rect x="172" y="197" width="74" height="22" rx="4" fill="#1c1c1c" stroke="#374151" stroke-width="1"/>
  <text x="209" y="212" font-family="'Courier New',monospace" font-size="10" fill="#d1d5db" text-anchor="middle">Express.js</text>

  <!-- ── DB/ORM tags (right side) ── -->
  <text x="450" y="168" font-family="'Courier New',monospace" font-size="9" fill="#475569" letter-spacing="2">DB/ORM</text>

  <rect x="510" y="155" width="68" height="22" rx="4" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="544" y="170" font-family="'Courier New',monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">MongoDB</text>

  <rect x="584" y="155" width="82" height="22" rx="4" fill="#0c1a3a" stroke="#1e40af" stroke-width="1"/>
  <text x="625" y="170" font-family="'Courier New',monospace" font-size="10" fill="#93c5fd" text-anchor="middle">PostgreSQL</text>

  <rect x="672" y="155" width="56" height="22" rx="4" fill="#1a0f2e" stroke="#5b21b6" stroke-width="1"/>
  <text x="700" y="170" font-family="'Courier New',monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">Prisma</text>

  <!-- ── Right info ── -->
  <text x="855" y="210" font-family="'Courier New',monospace" font-size="10" fill="#334155" text-anchor="end">✉ salimislam0036@gmail.com</text>
  <text x="855" y="227" font-family="'Courier New',monospace" font-size="10" fill="#334155" text-anchor="end">📍 Bangladesh</text>
</svg>
